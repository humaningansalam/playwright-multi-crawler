name: Deploy playwight-multi-crawler systemd

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync
      - run: uv run pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            
            set -e  # 에러 발생 시 중단

            # 배포 폴더로 이동 및 코드 업데이트
            export PATH="$HOME/.local/bin:$PATH"  # 환경 변수 추가
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch --all
              git reset --hard origin/main 
            fi

            # .env 파일 생성
            echo "PORT=${{ vars.SERVER_PORT }}" > ${{ secrets.DEPLOY_PATH }}/.env
            echo "DISPLAY=${{ vars.DISPLAY }}" >> ${{ secrets.DEPLOY_PATH }}/.env
            echo "APP_NAME=${{ vars.APP_NAME }}" >> ${{ secrets.DEPLOY_PATH }}/.env
            echo "APP_ENV=${{ vars.APP_ENV }}" >> ${{ secrets.DEPLOY_PATH }}/.env
            echo "LOG_LEVEL=${{ vars.LOG_LEVEL }}" >> ${{ secrets.DEPLOY_PATH }}/.env

            # 실행 권한 부여
            chmod +x ./config/install_dependencies.sh
            ./config/install_dependencies.sh

            # systemd 서비스 파일 생성
            echo "[Unit]
            Description=Playwright Multi Crawler Service
            After=network.target graphical.target

            [Service]
            Type=simple
            User=${{ secrets.SERVER_USER }}
            WorkingDirectory=${{ secrets.DEPLOY_PATH }}
            ExecStart=/home/${{ secrets.SERVER_USER }}/.local/bin/uv run python -m src.main
            Restart=on-failure
            RestartSec=10  
            StartLimitInterval=30
            StartLimitBurst=5  

            [Install]
            WantedBy=graphical.target" | sudo tee /etc/systemd/system/playwright-multi-crawler.service

            # systemd 데몬 다시 로드하고 서비스 시작
            sudo systemctl daemon-reload
            sudo systemctl reenable playwright-multi-crawler
            sudo systemctl restart playwright-multi-crawler

            if ! sudo systemctl is-active --quiet playwright-multi-crawler; then
              echo "Service did not become active after restart."
              sudo systemctl status playwright-multi-crawler --no-pager || true
              exit 1
            fi

            readiness_url="http://127.0.0.1:${{ vars.SERVER_PORT }}/health"
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error --max-time 2 "$readiness_url"; then
                echo "Service readiness check passed on attempt $attempt."
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                echo "Service did not become ready within 30 seconds."
                sudo systemctl status playwright-multi-crawler --no-pager || true
                exit 1
              fi

              sleep 1
            done
